<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#grad1)" rx="50" ry="50" />

  <!-- Abstract Chart Bars -->
  <rect x="100" y="250" width="60" height="150" fill="#ef4444" rx="5" /> <!-- DII Sell (Red) -->
  <rect x="180" y="150" width="60" height="250" fill="#22c55e" rx="5" /> <!-- FII Buy (Green) -->
  <rect x="260" y="200" width="60" height="200" fill="#ef4444" rx="5" /> <!-- Sell -->
  <rect x="340" y="100" width="60" height="300" fill="#22c55e" rx="5" filter="url(#glow)" /> <!-- Buy (Green - High) -->

  <!-- Rupee Symbol Overlay -->
  <text x="50%" y="55%" font-family="Arial, sans-serif" font-size="250" fill="white" text-anchor="middle" dominant-baseline="middle" opacity="0.3" font-weight="bold">₹</text>

  <!-- Text Label -->
  <text x="50%" y="450" font-family="Arial, sans-serif" font-size="40" fill="#e2e8f0" text-anchor="middle" font-weight="bold" letter-spacing="2">FII DII TRACKER</text>
</svg>
